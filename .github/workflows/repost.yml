name: Repost Pipeline

on:
  schedule:
    # 22:20 UTC = 3:50 AM IST  (1h 4m before other bot at 4:54 AM IST)
    # 10:20 UTC = 3:50 PM IST  (1h 4m before other bot at 4:54 PM IST)
    - cron: '20 10,22 * * *'
  workflow_dispatch:  # Allows manual triggering from GitHub UI (any branch)

jobs:
  run-repost:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run InstaAgent
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          IG_SESSION_ID: ${{ secrets.IG_SESSION_ID }}
          IG_SCRAPE_USER: ${{ secrets.IG_SCRAPE_USER }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          CLOUDINARY_FOLDER: ${{ secrets.CLOUDINARY_FOLDER }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          # ── YouTube ─────────────────────────────────────────────────────────
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: |
          # Add a random delay below 10 seconds
          delay=$((RANDOM % 10))
          echo "Sleeping for $delay seconds before posting..."
          sleep $delay

          # Run the repost pipeline
          python main.py --repost

      - name: Commit Tracker (if changed)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Stage the Excel tracker (replaces the old .txt files)
          git add data/tracker.xlsx
          # Only commit if there are actual changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update repost tracker [skip ci]" && git push)
